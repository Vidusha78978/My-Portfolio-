<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #greeting-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            transition: opacity 0.8s ease-out;
        }

        .text-gradient {
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .animate-up {
            animation: slideUp 0.8s ease-out forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .redirect-notice {
            position: absolute;
            bottom: 2rem;
            font-size: 0.875rem;
            color: #64748b;
            letter-spacing: 0.05em;
        }

        /* Sticker Container */
        .sticker-container {
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sticker-svg {
            filter: drop-shadow(0 0 15px rgba(96, 165, 250, 0.4));
            transition: transform 0.5s ease;
        }

        /* Rain Animation */
        .rain-drop {
            animation: rainFall 1s linear infinite;
        }

        @keyframes rainFall {
            0% { transform: translateY(-5px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(10px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="greeting-overlay">
        <div class="text-center px-6 animate-up">
            <!-- Dynamic Sticker Section -->
            <div id="time-sticker" class="sticker-container"></div>
            
            <h1 id="time-greeting" class="text-4xl md:text-6xl font-light mb-2">Hello,</h1>
            <h2 id="user-identity" class="text-3xl md:text-5xl font-bold text-gradient mb-8">Identifying...</h2>
            
            <div id="loading-bar" class="w-48 h-1 bg-gray-700 mx-auto rounded-full overflow-hidden">
                <div class="h-full bg-blue-500 w-0 transition-all duration-1500 ease-in-out" id="progress"></div>
            </div>
        </div>

        <p class="redirect-notice animate-pulse">Entering Portfolio...</p>
    </div>

    <script>
        function getIdentity() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const fromUrl = urlParams.get('email') || urlParams.get('name') || urlParams.get('user');
                if (fromUrl) {
                    localStorage.setItem('user_id', fromUrl);
                    return fromUrl;
                } 
                const storedIdentity = localStorage.getItem('user_id');
                return storedIdentity || "Friend";
            } catch (e) {
                return "Friend";
            }
        }

        function getTimeData() {
            const urlParams = new URLSearchParams(window.location.search);
            const weather = urlParams.get('weather');
            const hour = new Date().getHours();

            // 1. Check for RAIN sticker first (Manual trigger for demo)
            if (weather === 'rain') {
                return {
                    text: "Stay Dry,",
                    sticker: `
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-24 h-24 sticker-svg text-blue-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.5 19c.7 0 1.2-.6 1.2-1.2 0-.9-.9-1.3-1.2-2.3-.3 1-1.2 1.4-1.2 2.3 0 .6.5 1.2 1.2 1.2z"/>
                        <path d="M12 19c.7 0 1.2-.6 1.2-1.2 0-.9-.9-1.3-1.2-2.3-.3 1-1.2 1.4-1.2 2.3 0 .6.5 1.2 1.2 1.2z"/>
                        <path d="M6.5 19c.7 0 1.2-.6 1.2-1.2 0-.9-.9-1.3-1.2-2.3-.3 1-1.2 1.4-1.2 2.3 0 .6.5 1.2 1.2 1.2z"/>
                        <path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/>
                    </svg>`
                };
            }

            // 2. Default Time Stickers
            if (hour >= 5 && hour < 12) {
                // Morning Sun
                return {
                    text: "Good Morning,",
                    sticker: `<svg xmlns="http://www.w3.org/2000/svg" class="w-24 h-24 sticker-svg text-yellow-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`
                };
            }
            if (hour >= 12 && hour < 17) {
                // Afternoon Sun (Bright)
                return {
                    text: "Good Afternoon,",
                    sticker: `<svg xmlns="http://www.w3.org/2000/svg" class="w-24 h-24 sticker-svg text-orange-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="m16 12-4 4-4-4"/></svg>`
                };
            }
            // Night Moon
            return {
                text: "Good Evening,",
                sticker: `<svg xmlns="http://www.w3.org/2000/svg" class="w-24 h-24 sticker-svg text-indigo-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>`
            };
        }

        function init() {
            const timeGreetingEl = document.getElementById('time-greeting');
            const userIdEl = document.getElementById('user-identity');
            const stickerEl = document.getElementById('time-sticker');
            const progress = document.getElementById('progress');

            const identity = getIdentity();
            const timeData = getTimeData();

            timeGreetingEl.textContent = timeData.text;
            stickerEl.innerHTML = timeData.sticker;
            userIdEl.textContent = identity;

            setTimeout(() => { if (progress) progress.style.width = '100%'; }, 100);

            setTimeout(() => {
                try {
                    window.location.href = "home.html";
                } catch (err) {
                    window.location.assign("./home.html");
                }
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
