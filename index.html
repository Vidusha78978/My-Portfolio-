<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity & Greeting Logic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #greeting-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            transition: opacity 0.8s ease-out;
        }

        .text-gradient {
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .animate-up {
            animation: slideUp 0.8s ease-out forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .entering-text {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: #64748b;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }
    </style>
</head>
<body>

    <div id="greeting-overlay">
        <div class="text-center px-6 animate-up">
            <h1 id="time-greeting" class="text-4xl md:text-6xl font-light mb-2">Hello,</h1>
            <h2 id="user-identity" class="text-3xl md:text-5xl font-bold text-gradient mb-8">Identifying...</h2>
            
            <div id="loading-bar" class="w-48 h-1 bg-gray-700 mx-auto rounded-full overflow-hidden">
                <div class="h-full bg-blue-500 w-0 transition-all duration-1500 ease-in-out" id="progress"></div>
            </div>

            <div class="entering-text">Entering Portfolio</div>
        </div>
    </div>

    <script>
        /**
         * METHOD FOR IDENTIFYING USER
         * Priority: URL Param > LocalStorage > Browser Fingerprint
         */
        function getIdentity() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const nameParam = urlParams.get('name') || urlParams.get('email');
                
                // 1. Check URL Parameters first
                if (nameParam) {
                    localStorage.setItem('user_id', nameParam);
                    return nameParam;
                } 

                // 2. Check LocalStorage for returning users
                const storedIdentity = localStorage.getItem('user_id');
                if (storedIdentity) return storedIdentity;

                // 3. Browser Fingerprinting Fallback
                const fingerPrint = (window.screen.width + window.screen.height + navigator.language.length).toString();
                const randomId = "User-" + fingerPrint;
                
                localStorage.setItem('user_id', randomId);
                return randomId;

            } catch (e) {
                return "Visitor";
            }
        }

        function getTimeGreeting() {
            const hour = new Date().getHours();
            if (hour < 12) return "Good Morning,";
            if (hour < 17) return "Good Afternoon,";
            return "Good Evening,";
        }

        function init() {
            const timeGreetingEl = document.getElementById('time-greeting');
            const userIdEl = document.getElementById('user-identity');
            const progress = document.getElementById('progress');

            const identity = getIdentity();
            timeGreetingEl.textContent = getTimeGreeting();
            userIdEl.textContent = identity;

            setTimeout(() => { 
                if (progress) progress.style.width = '100%'; 
            }, 100);

            // Redirection logic
            setTimeout(() => {
                const target = "home.html";
                try {
                    window.location.href = target;
                } catch (err) {
                    console.error("Redirection failed:", err);
                    window.location.assign(target);
                }
            }, 2800);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
