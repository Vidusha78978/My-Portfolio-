<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidusha's Cloud Diary</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { h, render } from 'https://esm.sh/preact';
        import { useState, useEffect } from 'https://esm.sh/preact/hooks';

        // --- GLOBAL CONFIG ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : null;
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : "diary-app-vidusha";

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('daily');
            const [entries, setEntries] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [vault, setVault] = useState([]);
            const [showSync, setShowSync] = useState(false);
            const [syncInput, setSyncInput] = useState('');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!firebaseConfig) {
                    setLoading(false);
                    return;
                }

                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("Auth failed", e);
                    } finally {
                        setLoading(false);
                    }
                };
                
                initAuth();
                return onAuthStateChanged(auth, (u) => setUser(u));
            }, []);

            useEffect(() => {
                if (!user || !firebaseConfig) return;
                const db = getFirestore();
                const uid = localStorage.getItem('diary_uid') || user.uid;

                const unsubEntries = onSnapshot(doc(db, 'artifacts', APP_ID, 'users', uid, 'data', 'entries'), 
                    (s) => setEntries(s.data()?.list || []), (err) => console.error(err));
                const unsubTasks = onSnapshot(doc(db, 'artifacts', APP_ID, 'users', uid, 'data', 'tasks'), 
                    (s) => setTasks(s.data()?.list || []), (err) => console.error(err));
                const unsubVault = onSnapshot(doc(db, 'artifacts', APP_ID, 'users', uid, 'data', 'vault'), 
                    (s) => setVault(s.data()?.list || []), (err) => console.error(err));

                return () => { unsubEntries(); unsubTasks(); unsubVault(); };
            }, [user]);

            const saveData = async (key, list) => {
                if (!user || !firebaseConfig) return;
                const db = getFirestore();
                const uid = localStorage.getItem('diary_uid') || user.uid;
                await setDoc(doc(db, 'artifacts', APP_ID, 'users', uid, 'data', key), { list });
            };

            const addNew = () => {
                const title = prompt("Enter " + (activeTab === 'vault' ? "Name" : "Title") + ":");
                if (!title) return;

                if (activeTab === 'daily') {
                    const content = prompt("Description:");
                    const newList = [{ id: Date.now(), title, content, date: new Date().toLocaleDateString() }, ...entries];
                    setEntries(newList); saveData('entries', newList);
                } else if (activeTab === 'tasks') {
                    const newList = [{ id: Date.now(), text: title, completed: false }, ...tasks];
                    setTasks(newList); saveData('tasks', newList);
                } else if (activeTab === 'vault') {
                    const category = prompt("Category (Person/Event/Special):", "Person");
                    const details = prompt("Details:");
                    const newList = [{ id: Date.now(), name: title, category, details, date: new Date().toLocaleDateString() }, ...vault];
                    setVault(newList); saveData('vault', newList);
                }
            };

            const toggleTask = (id) => {
                const newList = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
                setTasks(newList); saveData('tasks', newList);
            };

            const remove = (key, id) => {
                if (!confirm("Delete this?")) return;
                let newList;
                if (key === 'entries') newList = entries.filter(e => e.id !== id);
                else if (key === 'tasks') newList = tasks.filter(t => t.id !== id);
                else newList = vault.filter(v => v.id !== id);
                
                if (key === 'entries') setEntries(newList);
                else if (key === 'tasks') setTasks(newList);
                else setVault(newList);
                saveData(key, newList);
            };

            if (loading) return h('div', { class: 'h-screen flex items-center justify-center bg-slate-50 font-sans' }, h('p', { class: 'text-slate-400 font-bold animate-pulse' }, "Connecting to Cloud..."));

            if (!firebaseConfig) return h('div', { class: 'h-screen flex items-center justify-center bg-slate-100 p-6 text-center font-sans' }, 
                h('div', { class: 'bg-white p-8 rounded-3xl shadow-xl' }, [
                    h('h1', { class: 'text-2xl font-bold mb-4' }, "Launch Required"),
                    h('p', { class: 'text-slate-500' }, "Please click the 'Preview' button in the toolbar to start the app.")
                ])
            );

            const currentUid = localStorage.getItem('diary_uid') || (user ? user.uid : '...');

            return h('div', { class: 'min-h-screen bg-slate-50 flex font-sans' }, [
                // Sidebar
                h('nav', { class: 'w-20 md:w-64 bg-white border-r border-slate-200 flex flex-col' }, [
                    h('div', { class: 'p-6 font-black text-xl text-blue-600 hidden md:block' }, "VIDUSHA DIARY"),
                    h('div', { class: 'flex-1 p-4 space-y-2' }, [
                        h('button', { onClick: () => setActiveTab('daily'), class: `w-full p-4 rounded-2xl flex items-center gap-3 ${activeTab === 'daily' ? 'bg-blue-50 text-blue-600' : 'text-slate-400'}` }, [h('i', { 'data-lucide': 'book-open' }), h('span', { class: 'hidden md:block font-bold' }, "Daily Logs")]),
                        h('button', { onClick: () => setActiveTab('tasks'), class: `w-full p-4 rounded-2xl flex items-center gap-3 ${activeTab === 'tasks' ? 'bg-emerald-50 text-emerald-600' : 'text-slate-400'}` }, [h('i', { 'data-lucide': 'check-square' }), h('span', { class: 'hidden md:block font-bold' }, "Tasks")]),
                        h('button', { onClick: () => setActiveTab('vault'), class: `w-full p-4 rounded-2xl flex items-center gap-3 ${activeTab === 'vault' ? 'bg-purple-50 text-purple-600' : 'text-slate-400'}` }, [h('i', { 'data-lucide': 'star' }), h('span', { class: 'hidden md:block font-bold' }, "Special Vault")])
                    ]),
                    h('div', { class: 'p-4 border-t' }, [
                        h('button', { onClick: () => setShowSync(true), class: 'text-[10px] font-mono text-slate-400 truncate w-full hover:text-blue-600' }, currentUid)
                    ])
                ]),

                // Content
                h('main', { class: 'flex-1 p-6 md:p-12 overflow-y-auto' }, [
                    h('div', { class: 'flex justify-between items-center mb-8' }, [
                        h('div', {}, [
                            h('h2', { class: 'text-3xl font-black text-slate-800 uppercase' }, activeTab),
                            h('p', { class: 'text-slate-400 font-medium' }, "Syncing to your private cloud.")
                        ]),
                        h('button', { onClick: addNew, class: 'bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold shadow-xl hover:bg-black transition' }, "+ Add Entry")
                    ]),

                    activeTab === 'daily' && h('div', { class: 'space-y-4' }, entries.map(e => h('div', { class: 'bg-white p-6 rounded-3xl border border-slate-100 relative group' }, [
                        h('span', { class: 'text-[10px] font-bold text-slate-300 uppercase' }, e.date),
                        h('h3', { class: 'text-xl font-bold text-slate-800' }, e.title),
                        h('p', { class: 'text-slate-500 mt-2' }, e.content),
                        h('button', { onClick: () => remove('entries', e.id), class: 'absolute top-6 right-6 opacity-0 group-hover:opacity-100 text-red-400' }, h('i', { 'data-lucide': 'trash-2', class: 'w-4 h-4' }))
                    ]))),

                    activeTab === 'tasks' && h('div', { class: 'bg-white rounded-3xl overflow-hidden' }, tasks.map(t => h('div', { class: 'p-5 flex items-center gap-4 border-b last:border-0' }, [
                        h('input', { type: 'checkbox', checked: t.completed, onChange: () => toggleTask(t.id), class: 'w-5 h-5 accent-emerald-500' }),
                        h('span', { class: `flex-1 font-bold ${t.completed ? 'line-through text-slate-300' : 'text-slate-700'}` }, t.text),
                        h('button', { onClick: () => remove('tasks', t.id), class: 'text-slate-200 hover:text-red-400' }, h('i', { 'data-lucide': 'trash-2', class: 'w-4 h-4' }))
                    ]))),

                    activeTab === 'vault' && h('div', { class: 'grid md:grid-cols-2 lg:grid-cols-3 gap-6' }, vault.map(v => h('div', { class: 'bg-white p-6 rounded-3xl border border-slate-100 hover:shadow-lg transition' }, [
                        h('div', { class: 'flex justify-between mb-2' }, [
                            h('span', { class: 'px-2 py-1 bg-purple-100 text-purple-600 text-[9px] font-black rounded-lg uppercase' }, v.category),
                            h('button', { onClick: () => remove('vault', v.id), class: 'text-slate-200 hover:text-red-400' }, h('i', { 'data-lucide': 'trash-2', class: 'w-4 h-4' }))
                        ]),
                        h('h3', { class: 'font-bold text-slate-800' }, v.name),
                        h('p', { class: 'text-xs text-slate-400' }, v.date),
                        h('p', { class: 'text-sm text-slate-500 mt-3 italic' }, v.details)
                    ]))),

                    // Sync UI
                    showSync && h('div', { class: 'fixed inset-0 bg-white/80 backdrop-blur-md flex items-center justify-center p-6 z-50' }, h('div', { class: 'max-w-xs w-full text-center' }, [
                        h('h2', { class: 'text-xl font-bold mb-4' }, "Cloud Sync"),
                        h('input', { placeholder: "Paste User ID", value: syncInput, onInput: (e) => setSyncInput(e.target.value), class: 'w-full p-4 rounded-2xl bg-slate-100 mb-4 border-0 font-mono text-xs' }),
                        h('button', { onClick: () => { localStorage.setItem('diary_uid', syncInput); window.location.reload(); }, class: 'w-full bg-blue-600 text-white p-4 rounded-2xl font-bold mb-2' }, "Connect Account"),
                        h('button', { onClick: () => setShowSync(false), class: 'text-slate-400 text-sm' }, "Cancel")
                    ]))
                ])
            ]);
        }

        render(h(App), document.body);
        setInterval(() => lucide.createIcons(), 500);
    </script>
</head>
<body class="bg-slate-50"></body>
</html>
